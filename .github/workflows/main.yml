name: Deploy static content to Pages

on:
  # Akan dijalankan setiap kali ada push ke branch 'main'
  push:
    branches: ["main"]
  # Memungkinkan Anda menjalankan workflow secara manual dari tab Actions
  workflow_dispatch:

# Mengatur permissions GITHUB_TOKEN untuk mengizinkan deployment ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mengizinkan hanya satu deployment secara bersamaan
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload seluruh isi repository (karena index.html ada di root)
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
